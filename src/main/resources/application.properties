# ── HTTP ────────────────────────────────────────────────────
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# ── Database ────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=RylsrmLbXnGJEnfjVGXEoGEKyMETIctM
quarkus.datasource.reactive.url=postgresql://postgres:RylsrmLbXnGJEnfjVGXEoGEKyMETIctM@postgres.railway.internal:5432/railway
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:RylsrmLbXnGJEnfjVGXEoGEKyMETIctM@postgres.railway.internal:5432/railway
quarkus.datasource.reactive.max-size=10

# ── Flyway ──────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# ── Scheduler ───────────────────────────────────────────────
quarkus.scheduler.enabled=true

# ── Health ──────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── OpenAPI / Swagger ────────────────────────────────────────
quarkus.smallrye-openapi.path=/q/openapi
quarkus.smallrye-openapi.info-title=ZamHealth Disease Surveillance API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ── Logging ─────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."zm.health".level=DEBUG

# ── App config ──────────────────────────────────────────────
zamhealth.ussd.secret=${AT_USSD_SECRET:dev-secret}
zamhealth.africastalking.api-key=${AT_API_KEY:}
zamhealth.africastalking.username=${AT_USERNAME:sandbox}
zamhealth.intelligence.baseline-multiplier=2.0
zamhealth.intelligence.r-value-threshold=1.2
zamhealth.intelligence.r-value-consecutive-days=3
zamhealth.intelligence.resolution-days=5

# ── Test profile ─────────────────────────────────────────────
%test.quarkus.datasource.reactive.url=postgresql://localhost:5432/zamhealth_test
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/zamhealth_test
%test.quarkus.datasource.username=zamhealth
%test.quarkus.datasource.password=zamhealth
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.scheduler.enabled=false
%test.quarkus.log.level=WARN